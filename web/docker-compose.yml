services:
  postgres:
    image: postgres:16-alpine
    container_name: hedgemony-postgres
    environment:
      POSTGRES_USER: hedgemony
      POSTGRES_PASSWORD: hedgemony_dev
      POSTGRES_DB: hedgemony
    ports:
      - "5432:5432"
    volumes:
      - hedgemony_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hedgemony -d hedgemony"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hedgemony_pgdata:
    driver: local
